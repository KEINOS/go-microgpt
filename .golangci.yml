# DO NOT EDIT THIS FILE WITHOUT PERMISSION
version: "2"

run:
  tests: true
  allow-parallel-runners: true
linters:
  default: all
  exclusions:
    paths:
      - .github
  disable:
    # Disabled due to wsl deprecation and new wsl_v5
    - wsl
    # Disabled due to testing private function purpose
    - testpackage
    # Disabled due to global variables for package-level settings
    - gochecknoglobals
    - depguard
    # Disabled due to short variable to match Python reference implementation
    - varnamelen
    # Disabled for educational implementation
    - forbidigo      # fmt.Printf needed for training progress
    - gosec          # crypto/rand not needed for educational RNG
    - paralleltest   # parallel execution not required
    - unparam        # keep parameter flexibility
    - wrapcheck      # prioritize simplicity
    - cyclop         # GPT forward pass is naturally complex
    - noinlineerr    # inline error checks are fine
    - funlen         # complex functions acceptable for clarity
    - gocritic       # BOS capitalization matches spec.md
    - noctx          # context not needed for educational HTTP requests
